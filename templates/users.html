<h2>ユーザー管理（管理者専用）</h2>

<form method="post">
  <input name="username" placeholder="ユーザー名">
  <input name="password" placeholder="パスワード">
  <button type="submit">追加</button>
</form>

<table border="1">
<tr>
  <th>ID</th><th>ユーザー名</th><th>権限</th>
</tr>

{% for user in users %}
<tr>
  <td>{{ user[1] }}</td>
  <td>{{ user[3] }}</td>
  <td>
    {% if session.role == "admin" and session.username != user[1] %}
    <form action="/users/delete" method="post" style="display:inline;">
      <input type="hidden" name="user_id" value="{{ user[0] }}">
      <button type="submit" onclick="return confirm('本当に削除しますか？')">
        削除
      </button>
    </form>
    {% endif %}
  </td>
</tr>
{% endfor %}
</table>

<a href="/">戻る</a>
